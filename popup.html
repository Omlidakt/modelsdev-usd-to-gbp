<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>USD → GBP</title>
<style>
body { font-family: system-ui, sans-serif; margin: 12px; width: 280px; }
.row { margin: 10px 0; }
.label { font-size: 12px; opacity: 0.8; }
.value { font-size: 14px; font-weight: 600; margin-top: 2px; }
input { width: 100%; padding: 8px; box-sizing: border-box; }
button { width: 100%; padding: 8px; margin-top: 8px; cursor: pointer; }
.small { font-size: 12px; opacity: 0.85; }
.err { color: #b00020; font-size: 12px; }
</style>
</head>
<body>
<div class="row">
<div class="label">Effective rate (USD → GBP)</div>
<div id="effectiveRate" class="value">—</div>
<div id="modeInfo" class="small">—</div>
</div>

<div class="row">
<div class="label">Set custom rate</div>
<input id="customRate" type="number" step="0.0001" min="0" placeholder="e.g. 0.79" />
<button id="saveCustom">Save custom rate</button>
<button id="useLive">Use live rate</button>
<div id="error" class="err"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
